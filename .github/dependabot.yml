version: 2

multi-ecosystem-groups:
  dependencies:
    schedule:
      # Check for updates on Sunday, 8PM UTC
      interval: "weekly"
      day: "sunday"
      time: "20:00"

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "dependencies"

  - package-ecosystem: "pip"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "dependencies"
